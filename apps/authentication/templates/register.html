<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Registration</title>
  </head>
  <body>
    <h1>Register</h1>
    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Register</button>
    </form>
    {% if form.errors %}
    <ul>
      {% for field, errors in form.errors.items %} {% for error in errors %}
      <li style="color: red">{{ error }}</li>
      {% endfor %} {% endfor %}
    </ul>
    {% endif %}
  </body>
</html>
